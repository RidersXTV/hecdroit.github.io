<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droit de l'Entreprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fenêtre d'authentification -->
    <div id="auth-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
        <div style="text-align:center; padding:20px; border:1px solid #ccc; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="color:#1a365d;">Accès Restreint</h2>
            <p>Veuillez entrer le mot de passe académique :</p>
            <input type="password" id="password-input" style="padding:10px; border-radius:4px; border:1px solid #ccc; width:200px;">
            <button onclick="checkPassword()" style="padding:10px 20px; background:#2b6cb0; color:white; border:none; border-radius:4px; cursor:pointer; margin-left:10px;">Valider</button>
            <p id="auth-error" style="color:red; display:none; margin-top:10px;">Mot de passe incorrect</p>
        </div>
    </div>
    <header>
        <div class="header-content">
            <button id="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
            <div class="header-titles">
                <h1>Droit de l'Entreprise</h1>
                <p>Site non officiel</p>
            </div>
        </div>
    </header>

    <div id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <div id="app-container">
        
        <aside id="sidebar">
            <div class="sidebar-header-mobile">
                <h3>Plan du cours</h3>
                <button class="close-menu-btn" onclick="toggleMobileSidebar()">✖</button>
            </div>
            <div id="sidebar-content">
                </div>
        </aside>

        <div id="main-wrapper">
            <div id="searchContainer">
                <input type="text" id="searchBar" placeholder="Rechercher une notion (ex: Dol, SA, Acte illicite, Demeure...)">
                <div id="breadcrumb" onclick="renderTopic('root')">🏠 Accueil</div>
            </div>

            <main id="main-content">
                </main>
        </div>

    </div>

    <!-- NOUVEAU FOOTER -->
    <footer id="site-footer">
        <div class="footer-content">
            <p>En cas de problème, merci de contacter : <strong>mcdm733@gmail.com</strong></p>
            <p><a href="#" onclick="renderTopic('bibliographie'); return false;">Voir les définitions juridiques et la bibliographie</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
