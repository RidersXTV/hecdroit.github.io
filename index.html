<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droit de l'Entreprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-main); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:inherit; padding: 20px;">
        <div style="background:var(--bg-card); color:var(--text-main); padding:30px; border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); max-width:400px; width:100%; text-align:center;">
            <h2 style="color:var(--primary); margin-top:0;">Accès Académique</h2>
            <p style="margin-bottom:20px; font-size:0.95em;">Ce contenu est réservé à l'usage privé pour la préparation des examens HEC.</p>
            
            <input type="password" id="password-input" placeholder="Mot de passe" 
                   style="padding:12px; border-radius:6px; border:1px solid var(--border); width:100%; box-sizing:border-box; background:var(--bg-main); color:var(--text-main); margin-bottom:15px; outline:none;">
            
            <button onclick="checkPassword()" 
                    style="padding:12px 20px; background:var(--secondary); color:white; border:none; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; transition: background 0.2s;">
                Accéder aux révisions
            </button>
            
            <p id="auth-error" style="color:var(--accent); display:none; margin-top:15px; font-weight:500;">Mot de passe incorrect</p>
        </div>
    </div>
    <header>
        <div class="header-content">
            <button id="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
            <div class="header-titles">
                <h1>Droit de l'Entreprise</h1>
                <p>Site non officiel</p>
            </div>
        </div>
    </header>

    <div id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <div id="app-container">
        
        <aside id="sidebar">
            <div class="sidebar-header-mobile">
                <h3>Plan du cours</h3>
                <button class="close-menu-btn" onclick="toggleMobileSidebar()">✖</button>
            </div>
            <div id="sidebar-content">
                </div>
        </aside>

        <div id="main-wrapper">
            <div id="searchContainer">
                <input type="text" id="searchBar" placeholder="Rechercher une notion (ex: Dol, SA, Acte illicite, Demeure...)">
                <div id="breadcrumb" onclick="renderTopic('root')">🏠 Accueil</div>
            </div>

            <main id="main-content">
                </main>
        </div>

    </div>

    <!-- NOUVEAU FOOTER -->
    <footer id="site-footer">
        <div class="footer-content">
            <p>En cas de problème, merci de contacter : <strong>mcdm733@gmail.com</strong></p>
            <p><a href="#" onclick="renderTopic('bibliographie'); return false;">Voir les définitions juridiques et la bibliographie</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
