<!DOCTYPE html>

    <div id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

            <div class="sidebar-header-mobile">

                </main>
        </div>

    </div>

    <!-- NOUVEAU FOOTER -->

        <div class="footer-content">
            <p>En cas de problème, merci de contacter : <strong>mcdm733@gmail.com</strong></p>
            <p><a href="#" onclick="renderTopic('bibliographie'); return false;">Voir les définitions juridiques et la bibliographie</a></p>
